# =============================================================================
# WauditBox v2.0 — configs/fail2ban-wauditbox.conf
# Custom Fail2ban jail for WauditBox SSH
# Deployed to /etc/fail2ban/jail.d/wauditbox.conf by 03-firewall-network.sh
# =============================================================================

[sshd-wauditbox]
enabled  = true
port     = 2222
filter   = sshd
logpath  = /var/log/auth.log
maxretry = 3
bantime  = 3600
findtime = 600
action   = iptables-multiport[name=SSH, port="2222", protocol=tcp]
