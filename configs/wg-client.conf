# =============================================================================
# WauditBox v2.0 — configs/wg-client.conf
# WireGuard Client Template — PLACEHOLDERS ONLY — DO NOT commit real keys
# Applied by 04-vpn-wireguard.sh to /etc/wireguard/wg0.conf
# =============================================================================

[Interface]
PrivateKey = PLACEHOLDER_GADGET_PRIVATE_KEY
Address = 10.200.1.1/16
DNS = 10.200.0.1
PostUp   = ip rule add from 10.200.1.1 table main priority 100
PostDown = ip rule del from 10.200.1.1 table main priority 100

[Peer]
PublicKey    = PLACEHOLDER_SERVER_PUBLIC_KEY
PresharedKey = PLACEHOLDER_PRESHARED_KEY
Endpoint     = PLACEHOLDER_SERVER_IP:51820
AllowedIPs   = 10.200.0.0/16
PersistentKeepalive = 25
